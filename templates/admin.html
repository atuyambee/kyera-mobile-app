<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyera Smart Ag - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 1.5rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 36px; font-weight: bold; color: #2E7D32; }
        .stat-label { color: #666; margin-top: 5px; }
        .btn {
            background: #2E7D32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }
        .btn:hover { background: #1b5e20; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #333; font-weight: 600; }
        tr:hover { background: #f9f9f9; }
        .section-title {
            margin: 20px 0 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
            .stat-number { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 Kyera Smart Agriculture - Admin Dashboard</h1>
            <div class="btn-group">
                <a href="/" class="btn btn-secondary">← Back to Home</a>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-farmers">-</div>
                <div class="stat-label">Total Farmers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-alerts">-</div>
                <div class="stat-label">Total Alerts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="today-alerts">-</div>
                <div class="stat-label">Today's Alerts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-questions">-</div>
                <div class="stat-label">Forum Questions</div>
            </div>
        </div>

        <div class="section-title">👥 Farmers List</div>
        <div style="overflow-x: auto;">
            <table id="farmers-table">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Phone</th><th>Crop</th><th>Village</th><th>Joined</th><th>Role</th> </tr>
                </thead>
                <tbody id="farmers-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/check');
                const data = await res.json();
                if (!data.authenticated || !data.farmer.is_admin) {
                    window.location.href = '/';
                }
            } catch(e) {
                window.location.href = '/';
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('total-farmers').textContent = data.data.total_farmers;
                    document.getElementById('total-alerts').textContent = data.data.total_alerts;
                    document.getElementById('today-alerts').textContent = data.data.today_alerts;
                    document.getElementById('total-questions').textContent = data.data.total_questions;
                }
            } catch(e) {
                console.error('Stats error:', e);
            }
        }

        async function loadFarmers() {
            try {
                const res = await fetch('/api/admin/farmers');
                const data = await res.json();
                if (data.success) {
                    let html = '';
                    data.data.forEach(f => {
                        const role = f.is_admin ? '👑 Admin' : '👨‍🌾 Farmer';
                        html += `<tr>
                            <td>${f.id}</td>
                            <td><strong>${escapeHtml(f.name)}</strong></td>
                            <td>${escapeHtml(f.phone)}</td>
                            <td>${f.main_crop || 'N/A'}</td>
                            <td>${f.village || 'N/A'}</td>
                            <td>${new Date(f.created).toLocaleDateString()}</td>
                            <td>${role}</td>
                        </tr>`;
                    });
                    document.getElementById('farmers-list').innerHTML = html;
                }
            } catch(e) {
                console.error('Farmers error:', e);
                document.getElementById('farmers-list').innerHTML = '<tr><td colspan="7">Failed to load farmers</td></tr>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST'});
            window.location.href = '/';
        }

        checkAuth();
        loadStats();
        loadFarmers();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
