<!DOCTYPE html>
<html>
<head>
    <title>Kyera Login</title>
    <style>
        body { font-family: Arial; background: #0a0a0a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #2ecc71; }
        h1 { color: #2ecc71; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .error { color: #e74c3c; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🌾 Kyera Login</h1>
        <input type="text" id="phone" placeholder="Phone" value="+256700000001">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>
    <script>
        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone, password})});
            const data = await res.json();
            if(data.success) { window.location.href = data.farmer.is_admin ? '/admin' : '/'; }
            else { document.getElementById('error').innerText = data.message; }
        }
    </script>
</body>
</html>
