<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyera Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, #0d2a1a, #061208);
            padding: 20px;
            overflow-y: auto;
        }
        .main-content {
            margin-left: 280px;
            padding: 20px;
        }
        .nav-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #2ecc71;
            color: #0a0a0a;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2ecc71;
            color: #0a0a0a;
        }
        .logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #e74c3c;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #2ecc71;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
        }
        button {
            background: #2ecc71;
            color: black;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-warning {
            background: #f39c12;
            color: black;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 30px;
            width: 50%;
            max-width: 500px;
            border-radius: 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">🌾 Kyera Admin</h2>
        <button class="nav-btn" onclick="loadSection('farmers')">👨‍🌾 Farmers</button>
        <button class="nav-btn" onclick="loadSection('alerts')">⚠️ Alerts</button>
        <button class="nav-btn" onclick="loadSection('pest-rules')">🐛 Pest Rules</button>
        <button class="nav-btn" onclick="loadSection('farming-tips')">💡 Farming Tips</button>
        <button class="nav-btn" onclick="loadSection('broadcast')">📢 Broadcast</button>
        <button class="nav-btn" onclick="loadSection('experts')">⭐ Experts</button>
        <button class="nav-btn logout" onclick="logout()">🚪 Logout</button>
    </div>
    
    <div class="main-content">
        <div class="stats">
            <div class="stat-card">Total Farmers<br><span class="stat-number" id="totalFarmers">0</span></div>
            <div class="stat-card">Total Alerts<br><span class="stat-number" id="totalAlerts">0</span></div>
            <div class="stat-card">Expert Farmers<br><span class="stat-number" id="expertFarmers">0</span></div>
        </div>
        <div id="contentArea"><div class="card">Select an option from the menu</div></div>
    </div>

    <!-- Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Edit Item</h2>
            <div id="modalForm"></div>
            <button onclick="saveModal()">Save</button>
            <button class="btn-danger" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let currentEditType = '';
        let currentEditId = null;
        
        async function loadSection(section) {
            document.getElementById('contentArea').innerHTML = '<div class="card"><div class="loading">Loading...</div></div>';
            if (section === 'farmers') await loadFarmers();
            else if (section === 'alerts') await loadAlerts();
            else if (section === 'pest-rules') await loadPestRules();
            else if (section === 'farming-tips') await loadFarmingTips();
            else if (section === 'broadcast') loadBroadcast();
            else if (section === 'experts') await loadExperts();
        }
        
        async function loadFarmers() {
            const res = await fetch('/api/admin/farmers');
            const data = await res.json();
            let farmers = data.farmers || data.data || [];
            let html = '<div class="card"><h2>👨‍🌾 Farmers List</h2><button onclick="addFarmer()">➕ Add Farmer</button><br><br><table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Crop</th><th>Village</th><th>Expert</th><th>Actions</th></tr></thead><tbody>';
            farmers.forEach(f => {
                html += `<tr>
                    <td>${f.id}</td>
                    <td>${f.name || f.full_name}</td>
                    <td>${f.phone}</td>
                    <td>${f.main_crop || f.crop_type || '-'}</td>
                    <td>${f.village || '-'}</td>
                    <td>${f.is_expert ? '⭐ Yes' : 'No'}</td>
                    <td>
                        <button class="btn-warning" onclick="editFarmer(${f.id})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deleteFarmer(${f.id})">🗑️ Delete</button>
                        <button onclick="makeExpert(${f.id})">⭐ Make Expert</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function loadAlerts() {
            const res = await fetch('/api/alerts/list');
            const data = await res.json();
            let alerts = data;
            let html = '<div class="card"><h2>⚠️ System Alerts</h2><button onclick="showAddAlertModal()">➕ Add Alert</button><br><br>';
            if(alerts.length === 0) html += '<p>No alerts found</p>';
            else {
                alerts.forEach(a => {
                    html += `<div style="background:#222; padding:15px; margin:10px 0; border-left:4px solid #2ecc71;">
                        <strong>${a.type || 'Info'}:</strong> ${a.message}<br>
                        <small>${a.created_at || ''}</small><br>
                        <button class="btn-warning" onclick="editAlert(${a.id})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deleteAlert(${a.id})">🗑️ Delete</button>
                    </div>`;
                });
            }
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function loadPestRules() {
            const res = await fetch('/api/pest-rules');
            const data = await res.json();
            let rules = data.rules || data;
            let html = '<div class="card"><h2>🐛 Pest Rules</h2><button onclick="showAddPestRuleModal()">➕ Add Pest Rule</button><br><br><table><thead><tr><th>ID</th><th>Pest</th><th>Crop</th><th>Action</th><th>Threshold</th><th>Actions</th></tr></thead><tbody>';
            rules.forEach(r => {
                html += `<tr>
                    <td>${r.id}</td>
                    <td>${r.pest_name}</td>
                    <td>${r.crop_type || 'All'}</td>
                    <td>${r.recommended_action}</td>
                    <td>${r.threshold || 70}%</td>
                    <td>
                        <button class="btn-warning" onclick="editPestRule(${r.id})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deletePestRule(${r.id})">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function loadFarmingTips() {
            const res = await fetch('/api/farming-tips');
            const data = await res.json();
            let tips = data.tips || data;
            let html = '<div class="card"><h2>💡 Farming Tips</h2><button onclick="showAddFarmingTipModal()">➕ Add Tip</button><br><br>';
            tips.forEach(t => {
                html += `<div style="background:#222; padding:15px; margin:10px 0;">
                    <strong>${t.title}</strong><br>${t.content}<br>
                    <small>${t.created_at || ''}</small><br>
                    <button class="btn-warning" onclick="editFarmingTip(${t.id})">✏️ Edit</button>
                    <button class="btn-danger" onclick="deleteFarmingTip(${t.id})">🗑️ Delete</button>
                </div>`;
            });
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function loadBroadcast() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <h2>📢 Send Broadcast</h2>
                    <textarea id="broadcastMsg" rows="4" placeholder="Type your message..."></textarea>
                    <button onclick="sendBroadcast()">Send to All Farmers</button>
                    <div id="result"></div>
                </div>
            `;
        }
        
        async function loadExperts() {
            const res = await fetch('/api/experts');
            const data = await res.json();
            let experts = data.experts || data;
            let html = '<div class="card"><h2>⭐ Expert Farmers</h2>';
            if(experts.length === 0) html += '<p>No expert farmers</p>';
            else {
                html += '<table><thead><tr><th>Name</th><th>Phone</th><th>Crop</th><th>Village</th><th>Actions</th></tr></thead><tbody>';
                experts.forEach(e => {
                    html += `<tr>
                        <td>${e.name || e.full_name} ⭐</td>
                        <td>${e.phone}</td>
                        <td>${e.main_crop || e.crop_type || '-'}</td>
                        <td>${e.village || '-'}</td>
                        <td><button class="btn-danger" onclick="removeExpert(${e.id})">Remove Expert</button></td>
                    </tr>`;
                });
                html += '</tbody></table>';
            }
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) { alert('Enter message'); return; }
            const res = await fetch('/api/broadcast/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById('result').innerHTML = `<p style="color:#2ecc71">✅ ${data.message}</p>`;
            document.getElementById('broadcastMsg').value = '';
        }
        
        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const data = await res.json();
            document.getElementById('totalFarmers').innerText = data.total_farmers || 0;
            document.getElementById('totalAlerts').innerText = data.total_alerts || 0;
            document.getElementById('expertFarmers').innerText = data.expert_farmers || 0;
        }
        
        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST'});
            window.location.href = '/login';
        }
        
        // Alert CRUD
        async function showAddAlertModal() {
            currentEditType = 'alert';
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Add Alert';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="alertMessage" placeholder="Message" required>
                <select id="alertRisk"><option value="info">Info</option><option value="warning">Warning</option><option value="critical">Critical</option></select>
                <input type="text" id="alertPest" placeholder="Pest/Disease">
                <textarea id="alertAdvice" placeholder="Advice"></textarea>
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function editAlert(id) {
            currentEditType = 'alert';
            currentEditId = id;
            const res = await fetch('/api/alerts/list');
            const data = await res.json();
            const alert = data.find(a => a.id == id);
            document.getElementById('modalTitle').innerText = 'Edit Alert';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="alertMessage" value="${alert.message}" required>
                <select id="alertRisk"><option value="info" ${alert.type === 'info' ? 'selected' : ''}>Info</option><option value="warning" ${alert.type === 'warning' ? 'selected' : ''}>Warning</option><option value="critical" ${alert.type === 'critical' ? 'selected' : ''}>Critical</option></select>
                <input type="text" id="alertPest" placeholder="Pest/Disease">
                <textarea id="alertAdvice" placeholder="Advice"></textarea>
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function deleteAlert(id) {
            if(confirm('Delete this alert?')) {
                await fetch(`/api/alerts/delete/${id}`, {method: 'DELETE'});
                loadAlerts();
            }
        }
        
        // Pest Rule CRUD
        async function showAddPestRuleModal() {
            currentEditType = 'pestRule';
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Add Pest Rule';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="pestName" placeholder="Pest Name" required>
                <input type="text" id="cropType" placeholder="Crop Type">
                <textarea id="action" placeholder="Recommended Action" required></textarea>
                <input type="number" id="threshold" placeholder="Threshold %" value="70">
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function editPestRule(id) {
            currentEditType = 'pestRule';
            currentEditId = id;
            const res = await fetch('/api/pest-rules');
            const data = await res.json();
            const rule = data.rules.find(r => r.id == id);
            document.getElementById('modalTitle').innerText = 'Edit Pest Rule';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="pestName" value="${rule.pest_name}" required>
                <input type="text" id="cropType" value="${rule.crop_type || ''}">
                <textarea id="action" required>${rule.recommended_action}</textarea>
                <input type="number" id="threshold" value="${rule.threshold || 70}">
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function deletePestRule(id) {
            if(confirm('Delete this pest rule?')) {
                await fetch(`/api/pest-rules/delete/${id}`, {method: 'DELETE'});
                loadPestRules();
            }
        }
        
        // Farming Tip CRUD
        async function showAddFarmingTipModal() {
            currentEditType = 'farmingTip';
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'Add Farming Tip';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="tipTitle" placeholder="Title" required>
                <textarea id="tipContent" placeholder="Content" required></textarea>
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function editFarmingTip(id) {
            currentEditType = 'farmingTip';
            currentEditId = id;
            const res = await fetch('/api/farming-tips');
            const data = await res.json();
            const tip = data.tips.find(t => t.id == id);
            document.getElementById('modalTitle').innerText = 'Edit Farming Tip';
            document.getElementById('modalForm').innerHTML = `
                <input type="text" id="tipTitle" value="${tip.title}" required>
                <textarea id="tipContent" required>${tip.content}</textarea>
            `;
            document.getElementById('editModal').style.display = 'block';
        }
        
        async function deleteFarmingTip(id) {
            if(confirm('Delete this farming tip?')) {
                await fetch(`/api/farming-tips/delete/${id}`, {method: 'DELETE'});
                loadFarmingTips();
            }
        }
        
        async function saveModal() {
            if(currentEditType === 'alert') {
                const data = {
                    message: document.getElementById('alertMessage').value,
                    risk: document.getElementById('alertRisk').value,
                    pest: document.getElementById('alertPest').value,
                    advice: document.getElementById('alertAdvice').value
                };
                if(currentEditId) {
                    await fetch(`/api/alerts/update/${currentEditId}`, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                } else {
                    await fetch('/api/alerts/add', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                }
                loadAlerts();
            } else if(currentEditType === 'pestRule') {
                const data = {
                    pest_name: document.getElementById('pestName').value,
                    crop_type: document.getElementById('cropType').value,
                    recommended_action: document.getElementById('action').value,
                    threshold: document.getElementById('threshold').value
                };
                if(currentEditId) {
                    await fetch(`/api/pest-rules/update/${currentEditId}`, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                } else {
                    await fetch('/api/pest-rules/add', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                }
                loadPestRules();
            } else if(currentEditType === 'farmingTip') {
                const data = {
                    title: document.getElementById('tipTitle').value,
                    content: document.getElementById('tipContent').value
                };
                if(currentEditId) {
                    await fetch(`/api/farming-tips/update/${currentEditId}`, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                } else {
                    await fetch('/api/farming-tips/add', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
                }
                loadFarmingTips();
            }
            closeModal();
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        // Farmer actions
        function addFarmer() { alert('Add farmer feature - Implement via admin panel'); }
        function editFarmer(id) { alert('Edit farmer ' + id); }
        function deleteFarmer(id) { alert('Delete farmer ' + id); }
        async function makeExpert(id) {
            await fetch(`/api/experts/make/${id}`, {method: 'POST'});
            loadFarmers();
            loadExperts();
        }
        async function removeExpert(id) {
            await fetch(`/api/experts/remove/${id}`, {method: 'POST'});
            loadExperts();
            loadFarmers();
        }
        
        // Check auth
        fetch('/api/auth/check').then(r=>r.json()).then(data=>{
            if(!data.authenticated || !data.farmer?.is_admin) {
                window.location.href = '/login';
            } else {
                loadStats();
                loadFarmers();
            }
        });
    </script>
</body>
</html>
