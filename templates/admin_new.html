<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyera Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: linear-gradient(135deg, #0d2a1a, #061208);
            padding: 20px;
        }
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }
        .nav-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #2ecc71;
            color: #0a0a0a;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2ecc71;
            color: #0a0a0a;
        }
        .logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #e74c3c;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #2ecc71;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
        }
        button {
            background: #2ecc71;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">🌾 Kyera Admin</h2>
        <button class="nav-btn" onclick="loadSection('farmers')">👨‍🌾 Farmers</button>
        <button class="nav-btn" onclick="loadSection('alerts')">⚠️ Alerts</button>
        <button class="nav-btn" onclick="loadSection('pest-rules')">🐛 Pest Rules</button>
        <button class="nav-btn" onclick="loadSection('farming-tips')">💡 Farming Tips</button>
        <button class="nav-btn" onclick="loadSection('broadcast')">📢 Broadcast</button>
        <button class="nav-btn" onclick="loadSection('experts')">⭐ Experts</button>
        <button class="nav-btn logout" onclick="logout()">🚪 Logout</button>
    </div>
    
    <div class="main-content">
        <div class="stats">
            <div class="stat-card">Total Farmers<br><span class="stat-number" id="totalFarmers">0</span></div>
            <div class="stat-card">Total Alerts<br><span class="stat-number" id="totalAlerts">0</span></div>
            <div class="stat-card">Expert Farmers<br><span class="stat-number" id="expertFarmers">0</span></div>
        </div>
        <div id="contentArea"><div class="card">Select an option from the menu</div></div>
    </div>

    <script>
        async function loadSection(section) {
            document.getElementById('contentArea').innerHTML = '<div class="card">Loading...</div>';
            if (section === 'farmers') await loadFarmers();
            else if (section === 'alerts') await loadAlerts();
            else if (section === 'pest-rules') loadPestRules();
            else if (section === 'farming-tips') loadFarmingTips();
            else if (section === 'broadcast') loadBroadcast();
            else if (section === 'experts') await loadExperts();
        }
        
        async function loadFarmers() {
            const res = await fetch('/api/admin/farmers');
            const data = await res.json();
            let farmers = data.farmers || data.data || [];
            let html = '<div class="card"><h2>Farmers List</h2><table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Crop</th><th>Village</th></tr></thead><tbody>';
            farmers.forEach(f => {
                html += `<tr><td>${f.id}</td><td>${f.name || f.full_name}</td><td>${f.phone}</td><td>${f.main_crop || '-'}</td><td>${f.village || '-'}</td></tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function loadAlerts() {
            const res = await fetch('/api/alerts/list');
            const data = await res.json();
            let alerts = data.alerts || data;
            let html = '<div class="card"><h2>Alerts</h2>';
            alerts.forEach(a => {
                html += `<div style="padding:10px; background:#222; margin:10px 0; border-left:4px solid #2ecc71;"><strong>${a.type || 'Info'}:</strong> ${a.message}<br><small>${a.created_at || ''}</small></div>`;
            });
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function loadPestRules() {
            document.getElementById('contentArea').innerHTML = '<div class="card"><h2>Pest Rules</h2><p>Pest management rules will appear here</p></div>';
        }
        
        function loadFarmingTips() {
            document.getElementById('contentArea').innerHTML = '<div class="card"><h2>Farming Tips</h2><p>Farming tips will appear here</p></div>';
        }
        
        function loadBroadcast() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <h2>Send Broadcast</h2>
                    <textarea id="broadcastMsg" rows="4" placeholder="Type your message..."></textarea>
                    <button onclick="sendBroadcast()">Send to All Farmers</button>
                    <div id="result"></div>
                </div>
            `;
        }
        
        async function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(!msg) { alert('Enter message'); return; }
            const res = await fetch('/api/broadcast/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById('result').innerHTML = `<p style="color:#2ecc71">${data.message}</p>`;
            document.getElementById('broadcastMsg').value = '';
        }
        
        async function loadExperts() {
            const res = await fetch('/api/experts');
            const data = await res.json();
            let experts = data.experts || data;
            let html = '<div class="card"><h2>Expert Farmers</h2><table><thead><tr><th>Name</th><th>Phone</th><th>Crop</th><th>Village</th></tr></thead><tbody>';
            experts.forEach(e => {
                html += `<tr><td>${e.name || e.full_name} ⭐</td><td>${e.phone}</td><td>${e.main_crop || e.crop_type || '-'}</td><td>${e.village || '-'}</td></tr>`;
            });
            html += '</tbody></table></div>';
            document.getElementById('contentArea').innerHTML = html;
        }
        
        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const data = await res.json();
            document.getElementById('totalFarmers').innerText = data.total_farmers || 0;
            document.getElementById('totalAlerts').innerText = data.total_alerts || 0;
            document.getElementById('expertFarmers').innerText = data.expert_farmers || 0;
        }
        
        async function logout() {
            await fetch('/api/auth/logout', {method: 'POST'});
            window.location.href = '/login';
        }
        
        // Check auth and load
        fetch('/api/auth/check').then(r=>r.json()).then(data=>{
            if(!data.authenticated || !data.farmer?.is_admin) {
                window.location.href = '/login';
            } else {
                loadStats();
                loadFarmers();
            }
        });
    </script>
</body>
</html>
